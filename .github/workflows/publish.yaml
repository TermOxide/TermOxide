name: Publish workspace crates

on:
  workflow_call:
    inputs:
      matrix:
        required: true
        type: string  # JSON array of crate names

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Install cargo-workspaces
        run: cargo install cargo-workspaces

      - name: Prepare crate matrix
        id: prepare
        shell: bash
        run: |
          echo "Input matrix: ${{ inputs.matrix }}"
          crates=$(echo '${{ inputs.matrix }}' | jq -r '.[]')
          echo "Crates to consider for publish: $crates"
          echo "$crates" > crates.txt

      - name: Publish crates in dependency order
        shell: bash
        run: |
          echo "Publishing workspace crates using cargo-workspaces..."
          while read crate; do
            version=$(cargo metadata --no-deps --format-version 1 \
                      | jq -r --arg c "$crate" '.packages[] | select(.name==$c) | .version')

            # Skip if version already exists on crates.io
            if cargo search $crate | grep -q "^$crate = \"$version\""; then
              echo "Skipping $crate@$version (already published)"
              continue
            fi

            echo "Publishing $crate@$version..."
            cargo workspaces publish -p "$crate" --no-verify

            echo "Creating GitHub release for $crate@$version..."
            gh release create "$crate@$version" \
              --title "$crate@$version" \
              --notes "Published via CI"
          done < crates.txt