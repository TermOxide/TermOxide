name: Detect edited crates

on:
  workflow_call:
    inputs:
      base_ref:
        required: false
        type: string
    outputs:
      matrix:
        description: "JSON array of edited crates"
        value: ${{ jobs.matrix.outputs.matrix }}

jobs:
  matrix:
    name: Detect edited crates (with reverse dependants)
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Determine base ref
        id: base
        shell: bash
        run: |
          BASE_REF="${{ inputs.base_ref }}"
          if [ -z "$BASE_REF" ]; then
            BASE_REF="${{ github.base_ref }}"
          fi
          if [ -z "$BASE_REF" ]; then
            BASE_REF="main"
          fi
          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"
          echo "Using base ref: $BASE_REF"

      - name: Fetch base branch
        if: ${{ steps.base.outputs.base_ref != '' }}
        run: |
          git fetch --no-tags --prune --depth=1 origin \
            "${{ steps.base.outputs.base_ref }}:${{ steps.base.outputs.base_ref }}"
          git show-ref | grep -E "refs/(heads|remotes)/${{ steps.base.outputs.base_ref }}" || true

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Install cargo-workspaces
        run: cargo install cargo-workspaces

      - name: Run changed-crates detector (with reverse dependants)
        id: detect
        shell: bash
        run: |
          BASE_REF="${{ steps.base.outputs.base_ref }}"
          changed=$(cargo run --release -p cargo-extract -- "$BASE_REF")
          echo "Detected changed crates (incl. reverse dependants): $changed"
          echo "raw_list=$changed" >> $GITHUB_OUTPUT

      - name: Generate JSON matrix
        id: generate
        shell: bash
        run: |
          raw_list="${{ steps.detect.outputs.raw_list }}"

          if [ -z "$raw_list" ]; then
            echo "matrix=[]" >> $GITHUB_OUTPUT
            echo "Generated matrix: []"
            exit 0
          fi

          crates=$(jq -c -Rn --arg csv "$raw_list" '$csv | split(" ")')
          echo "matrix=$crates" >> $GITHUB_OUTPUT
          echo "Generated matrix: $crates"